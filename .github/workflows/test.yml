name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/cli/go.sum

      - name: Create placeholder dist for embed
        run: mkdir -p internal/spa/dist && echo '<!doctype html>' > internal/spa/dist/index.html

      - name: Run tests
        run: go test -race -cover ./...

  web-test:
    name: Web Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typeCheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test --if-present
